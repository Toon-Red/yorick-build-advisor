name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pywin32 webview2 voxe

      - name: Build exe
        run: python -m PyInstaller build.spec --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: iscc installer.iss

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Yorick Build Advisor v${{ steps.version.outputs.version }}
          files: |
            installer_output/YorickBuildAdvisor_Setup.exe
            dist/YorickBuildAdvisor.exe
          generate_release_notes: true
