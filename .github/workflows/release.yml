name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t yorick-tests .

      - name: Run tests
        run: docker run --rm yorick-tests

  build:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set version in source files
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          cat > version.py << EOF
          """App version — overwritten by CI from git tag during release builds."""
          __version__ = "$VERSION"
          DEV_MODE = False
          EOF
          sed -i 's/^          //' version.py
          sed -i "s/filevers=(.*)/filevers=($MAJOR, $MINOR, $PATCH, 0)/" version_info.txt
          sed -i "s/prodvers=(.*)/prodvers=($MAJOR, $MINOR, $PATCH, 0)/" version_info.txt
          sed -i "s/FileVersion', u'.*'/FileVersion', u'$VERSION'/" version_info.txt
          sed -i "s/ProductVersion', u'.*'/ProductVersion', u'$VERSION'/" version_info.txt
          echo "=== version.py ==="
          cat version.py

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pywin32 pythonnet

      - name: Build exe
        run: python -m PyInstaller build.spec --noconfirm

      - name: Smoke test
        shell: bash
        run: |
          ./dist/YorickBuildAdvisor.exe --server-only > smoke_stdout.log 2> smoke_stderr.log &
          EXE_PID=$!
          echo "Launched exe (PID $EXE_PID)"
          TAG_VER="${{ steps.version.outputs.version }}"

          for i in $(seq 1 60); do
            # 1. Check if process died — fail immediately with logs
            if ! kill -0 $EXE_PID 2>/dev/null; then
              echo "FAIL: exe process died (PID $EXE_PID)"
              echo "=== stdout ===" && cat smoke_stdout.log
              echo "=== stderr ===" && cat smoke_stderr.log
              exit 1
            fi

            # 2. Check health endpoint
            RESP=$(curl -s http://127.0.0.1:5001/api/health 2>/dev/null || true)
            if echo "$RESP" | grep -q '"status":"ok"'; then
              echo "Health OK: $RESP"
              echo "$RESP" | grep -q "\"version\":\"$TAG_VER\"" && echo "Version matches: $TAG_VER" || echo "WARNING: version mismatch"
              echo "$RESP" | grep -q '"dev_mode":false' && echo "Production mode confirmed" || echo "WARNING: dev_mode not false"
              kill $EXE_PID 2>/dev/null || true
              exit 0
            fi

            sleep 1
          done

          echo "FAIL: process alive but health never responded after 60s"
          echo "=== stdout ===" && cat smoke_stdout.log
          echo "=== stderr ===" && cat smoke_stderr.log
          kill $EXE_PID 2>/dev/null || true
          exit 1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/YorickBuildAdvisor.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Yorick Build Advisor ${{ github.ref_name }}
          files: dist/YorickBuildAdvisor.exe
          generate_release_notes: true
